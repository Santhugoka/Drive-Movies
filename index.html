<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone" id="phone">
  <div class="screen-wrap">

    <!-- ====== SCREEN: SEARCH ====== -->
    <div class="screen" id="s-search">
      <div style="padding:16px">
        <div style="display:flex;align-items:center;background:var(--card2);border-radius:14px;padding:4px 12px;margin-bottom:16px;border:1px solid rgba(255,255,255,.1)">
          <i class="ti ti-search" style="font-size:20px;color:var(--gray)"></i>
          <input type="text" id="search-input" placeholder="Search movies, series..." style="flex:1;background:transparent;border:none;color:#fff;padding:12px;font-family:var(--font);font-size:14px;outline:none" oninput="doSearch(this.value)">
          <i class="ti ti-microphone" style="font-size:18px;color:var(--gray)"></i>
        </div>
        <div id="search-results" class="sy" style="max-height:calc(100vh - 250px)"></div>
      </div>
      <div class="bnav">
        <div class="ni" onclick="navTo('s-home',this)"><i class="ti ti-home"></i><span>Home</span></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Movies')"><i class="ti ti-movie"></i><span>Movies</span></div>
        <div class="ni" onclick="toggleTheme()"><i class="ti ti-sun theme-toggle"></i><span>Theme</span></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Series')"><i class="ti ti-device-tv"></i><span>Series</span></div>
        <div class="ni on" onclick="navTo('s-search',this)"><i class="ti ti-search"></i><span>Search</span><div class="ndot"></div></div>
      </div>
    </div>

    <!-- ====== SCREEN: HOME / FEATURED ====== -->
    <div class="screen active" id="s-home">
      <div class="sy" id="home-scroll">
        <!-- HERO -->
        <div class="hw" id="hero-wrap">
          <div class="hbg" id="hero-bg"><img id="hero-img" src="" alt=""></div>
          <div class="hgrad"></div>

          <div class="hcontent">
            <div class="htags" id="hero-tags"></div>
            <div class="htitle" id="hero-title"></div>
            <div class="hrat"><span class="stars">★★★★</span><span class="rxt" id="hero-meta"></span></div>
            <div class="hdesc" id="hero-desc"></div>
            <div class="hbtns">
              <button class="bprim" id="hero-watch-btn"><div class="ptri"></div> Watch Now</button>
              <button class="bsec" onclick="addMyList()"><i class="ti ti-plus" style="font-size:15px"></i> My List</button>
            </div>
          </div>
        </div>
        <!-- Thumbnail strip -->
        <div class="ts" id="thumb-strip"></div>
        <!-- Dynamic Sections -->
        <div id="home-sections" style="padding-bottom:20px"></div>
      </div>
      <div class="bnav">
        <div class="ni on" onclick="navTo('s-home',this)"><i class="ti ti-home"></i><span>Home</span><div class="ndot"></div></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Movies')"><i class="ti ti-movie"></i><span>Movies</span></div>
        <div class="ni" onclick="toggleTheme()"><i class="ti ti-sun theme-toggle"></i><span>Theme</span></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Series')"><i class="ti ti-device-tv"></i><span>Series</span></div>
        <div class="ni" onclick="navTo('s-search',this)"><i class="ti ti-search"></i><span>Search</span></div>
      </div>
    </div>

    <!-- ====== SCREEN: BROWSE ====== -->
    <div class="screen" id="s-browse">
      <div class="sy" id="browse-content" style="padding-bottom:10px"></div>
      <div class="bnav">
        <div class="ni" onclick="navTo('s-home',this)"><i class="ti ti-home"></i><span>Home</span></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Movies')"><i class="ti ti-movie"></i><span>Movies</span></div>
        <div class="ni" onclick="toggleTheme()"><i class="ti ti-sun theme-toggle"></i><span>Theme</span></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Series')"><i class="ti ti-device-tv"></i><span>Series</span></div>
        <div class="ni" onclick="navTo('s-search',this)"><i class="ti ti-search"></i><span>Search</span></div>
      </div>
    </div>


    <!-- ====== SCREEN: MY LIST (Continue Watching) ====== -->
    <div class="screen" id="s-cw">
      <div class="cwhd">
        <div>
          <div class="cwhead">My List</div>
          <div class="cwsub" id="mylist-count">0 titles saved</div>
        </div>
        <i class="ti ti-dots-vertical" style="font-size:20px;cursor:pointer" onclick="showMyListOptions()"></i>
      </div>
      <div class="sy" id="cw-content" style="padding-bottom:10px">
        <div id="mylist-empty" style="text-align:center;padding:60px 20px;color:var(--gray)">
          <i class="ti ti-bookmark" style="font-size:48px;display:block;margin-bottom:12px;opacity:.3"></i>
          <div style="font-size:13px;font-weight:600">No titles saved yet</div>
          <div style="font-size:11px;margin-top:6px;opacity:.7">Browse and add to your list</div>
        </div>
      </div>
      <div class="bnav">
        <div class="ni" onclick="navTo('s-home',this)"><i class="ti ti-home"></i><span>Home</span></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Movies')"><i class="ti ti-movie"></i><span>Movies</span></div>
        <div class="ni" onclick="toggleTheme()"><i class="ti ti-sun theme-toggle"></i><span>Theme</span></div>
        <div class="ni" onclick="navTo('s-browse',this); filterBrowse('Series')"><i class="ti ti-device-tv"></i><span>Series</span></div>
        <div class="ni" onclick="navTo('s-search',this)"><i class="ti ti-search"></i><span>Search</span></div>
      </div>
    </div>

    <!-- ====== SCREEN: PLAYER ====== -->
    <div class="screen" id="s-player">
      <div class="playersc">
        <!-- TOP BAR: Outside video for guaranteed visibility -->
        <div class="p-top-bar">
          <button class="p-back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
          <div class="p-info">
            <div class="p-title" id="p-title-main">Video title</div>
            <div class="p-subtitle" id="p-title-sub">Movie • HD</div>
          </div>
          <button class="p-fs-btn" onclick="toggleFullscreen()"><i class="ti ti-maximize"></i></button>
        </div>

        <div class="pvideo" id="player-video-wrap">
          <iframe id="player-iframe" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
        
        <div class="pbody">
          <div class="pftitle" id="pbody-title"></div>
          <div class="pfmeta" id="pbody-meta"></div>

          <div id="player-ep-list"></div>
          <div class="mls" id="player-related">
            <div class="mlsh">More Like This</div>
            <div class="mlrow" id="player-related-row"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- screen-wrap -->

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
    <div class="modal-box" id="modal-box">
      <div class="modal-banner">
        <img id="modal-banner-img" src="" alt="">
        <div class="modal-fade"></div>
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x" style="font-size:15px"></i></button>
      </div>
      <div class="modal-body">
        <div style="margin-top:10px;margin-bottom:4px">
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-meta" id="modal-meta"></div>
        </div>
        <button class="modal-watch-btn" id="modal-watch-btn"><div class="ptri"></div> Watch Now</button>
        <button class="modal-add-btn" id="modal-add-btn"><i class="ti ti-plus" style="font-size:15px"></i> Add to My List</button>
        <div id="modal-eps-section"></div>
      </div>
    </div>
  </div>

  <!-- MORE OPTIONS BOTTOM SHEET -->
  <div class="modal-overlay" id="options-overlay" style="display:none" onclick="closeOptions(event)">
    <div class="modal-box" style="padding-bottom:10px">
      <div style="width:40px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin:12px auto"></div>
      <div style="padding:10px 20px 20px">
        <div style="font-size:18px;font-weight:900;margin-bottom:20px;text-align:center">List Options</div>
        <div class="opt-item" onclick="clearMyList()">
          <i class="ti ti-trash" style="color:#ff4d4d"></i>
          <span>Clear My List</span>
        </div>
        <div class="opt-item" onclick="toast('Sorting by date...')">
          <i class="ti ti-sort-descending"></i>
          <span>Sort by Recent</span>
        </div>
        <div class="opt-item" onclick="closeOptions()">
          <i class="ti ti-x"></i>
          <span>Cancel</span>
        </div>
      </div>
    </div>
  </div>

</div><!-- phone -->

<script src="script.js"></script>
</body>
</html>
